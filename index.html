<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHO VIỆT TUẤN - DASHBOARD LÁI XE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --danger: #ff4757; --success: #2ed573; --warning: #ffa502; --info: #1e90ff; }
        body { font-family: system-ui, sans-serif; margin: 0; background: #000; color: #fff; padding: 10px; overflow-x: hidden; }
        
        .container { max-width: 850px; margin: auto; }
        
        /* Khu vực tìm kiếm cố định cực lớn */
        .search-area { position: sticky; top: 0; background: #000; padding: 10px 0 15px 0; z-index: 1000; }
        .search-box { display: flex; gap: 10px; height: 80px; }
        
        input { 
            flex: 1; background: #1a1a1a; border: 3px solid #333; border-radius: 15px; 
            color: #fff; padding: 0 20px; font-size: 32px; font-weight: 900; outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--info); background: #222; }
        input.listening { border-color: var(--danger); background: #2d0000; }
        
        .btn-voice { 
            background: var(--danger); color: white; width: 140px; border: none; 
            border-radius: 15px; font-size: 24px; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }
        .btn-voice.recording { animation: pulse-red 0.8s infinite; background: #ff6b81; }

        /* Danh sách dạng Thẻ Card */
        .item-list { margin-top: 5px; }
        .card { 
            background: #111; border-radius: 20px; padding: 20px; margin-bottom: 15px; 
            border: 1px solid #222; border-left: 12px solid var(--info);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .sku { font-size: 16px; color: #666; font-weight: bold; margin-bottom: 5px; display: block; letter-spacing: 1px; }
        
        .row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .product-name { font-size: 32px; font-weight: 900; color: #70a1ff; flex: 1; padding-right: 15px; line-height: 1.2; }
        
        .stock-tag { 
            font-size: 38px; font-weight: 900; padding: 10px 20px; border-radius: 15px; 
            background: #222; color: #fff; min-width: 80px; text-align: center;
            border: 2px solid #333;
        }
        .out-of-stock { background: var(--danger) !important; border: none; color: #fff; }
        
        .row-2 { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-top: 1px solid #222; padding-top: 15px; 
        }
        .price { font-size: 36px; font-weight: 900; color: var(--warning); letter-spacing: -1px; }
        .program { font-size: 20px; color: var(--success); font-weight: 700; text-align: right; max-width: 50%; }

        #status { font-size: 14px; color: #444; margin-top: 10px; text-align: center; font-weight: bold; }
        
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="ĐỌC MÃ..." onkeyup="searchData()" autocomplete="off">
            <button class="btn-voice" id="voiceBtn" onclick="startVoice()">NÓI</button>
        </div>
        <div id="status">Đang kết nối kho hàng...</div>
    </div>

    <div id="itemList" class="item-list">
        </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1k5jVGEaXBRv9EOrUqSiTDJ7IrwWHIsTl3KrnYWArTrpZ17gLORwN06RqLUI6Y7My_Xs6OL6Es1Bl/pub?gid=954048889&single=true&output=csv";
    let allData = [];
    let fuse;

    function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.map(row => {
                    let cleanRow = {};
                    Object.keys(row).forEach(key => {
                        cleanRow[key.trim().replace(/\r?\n|\r/g, "")] = row[key];
                    });
                    return cleanRow;
                }).filter(row => row['Mã sản phẩm'] || row['Mã hàng']);

                fuse = new Fuse(allData, {
                    keys: ['Mã sản phẩm', 'Mã hàng'],
                    threshold: 0.4, // Tăng nhẹ sai số để dễ tìm khi lái xe
                    distance: 100
                });

                renderCards(allData);
                document.getElementById('status').innerText = `KHO: ${allData.length} MÃ - SẴN SÀNG`;
            }
        });
    }

    function renderCards(data) {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        const displayData = data.slice(0, 15); // Hiện ít lại để tập trung nhìn

        displayData.forEach(item => {
            const ton = (item['Tồn'] || '0').toString().trim();
            const isOut = (parseInt(ton) <= 0 || ton.toLowerCase() === 'hết' || ton === '-1');
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="sku">${item['Mã sản phẩm'] || ''}</span>
                <div class="row-1">
                    <div class="product-name">${item['Mã hàng'] || 'KHÔNG TÊN'}</div>
                    <div class="stock-tag ${isOut ? 'out-of-stock' : ''}">${ton}</div>
                </div>
                <div class="row-2">
                    <div class="price">${item['Giá'] || 'LIÊN HỆ'}</div>
                    <div class="program">${item['Chương trình'] || ''}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function searchData() {
        const query = document.getElementById('searchInput').value;
        if (!query) { renderCards(allData); return; }
        const results = fuse.search(query);
        renderCards(results.map(r => r.item));
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'vi-VN';
        const btn = document.getElementById('voiceBtn');
        const input = document.getElementById('searchInput');

        recognition.onstart = () => { 
            btn.classList.add('recording'); 
            input.classList.add('listening');
            btn.innerText = "NGHE..."; 
        };
        
        recognition.onresult = (event) => {
            let text = event.results[0][0].transcript.toLowerCase()
                .replace(/không/g, '0').replace(/một/g, '1').replace(/hai/g, '2')
                .replace(/ba/g, '3').replace(/bốn/g, '4').replace(/năm/g, '5')
                .replace(/sáu/g, '6').replace(/bảy/g, '7').replace(/tám/g, '8')
                .replace(/chín/g, '9').replace(/mờ/g, 'm').replace(/\./g, '')
                .replace(/bg/g, 'vdg').replace(/dg/g, 'vdg') // Sửa lỗi vdg hay bị nghe nhầm
                .replace(/\s+/g, '').toUpperCase();

            input.value = text;
            searchData();
        };

        recognition.onend = () => { 
            btn.classList.remove('recording'); 
            input.classList.remove('listening');
            btn.innerText = "NÓI"; 
        };
        
        recognition.onerror = () => {
            btn.classList.remove('recording');
            input.classList.remove('listening');
            btn.innerText = "LỖI";
        };

        recognition.start();
    }

    window.onload = fetchData;
</script>
</body>
</html>
