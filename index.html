<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Việt Tuấn - Chế độ Lái xe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        :root { --primary: #1a5f7a; --danger: #d63031; --success: #27ae60; --warning: #f39c12; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #121212; color: #eee; padding: 10px; }
        
        .container { max-width: 800px; margin: auto; }
        
        /* Khu vực tìm kiếm cố định cực lớn */
        .search-area { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 1000; }
        .search-box { display: flex; gap: 10px; height: 70px; }
        input { flex: 1; background: #222; border: 2px solid #444; border-radius: 12px; color: #fff; padding: 0 20px; font-size: 24px; font-weight: bold; outline: none; }
        input:focus { border-color: var(--warning); }
        
        .btn-voice { background: var(--danger); color: white; width: 120px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-voice.recording { animation: blink 0.8s infinite; background: #ff7675; }

        /* Danh sách dạng Thẻ (Card) để dễ nhìn khi rung lắc */
        .item-list { margin-top: 10px; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 8px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .row-1 { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .product-name { font-size: 26px; font-weight: 800; color: #74b9ff; flex: 1; padding-right: 10px; line-height: 1.2; }
        .stock-tag { font-size: 30px; font-weight: 900; padding: 5px 15px; border-radius: 10px; background: #333; min-width: 60px; text-align: center; }
        .out-of-stock { background: var(--danger) !important; color: white; }
        
        .row-2 { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #333; padding-top: 10px; }
        .price { font-size: 28px; font-weight: bold; color: var(--warning); }
        .program { font-size: 18px; color: var(--success); font-style: italic; font-weight: 500; }
        .sku { font-size: 14px; color: #888; margin-bottom: 5px; display: block; }

        #status { font-size: 14px; color: #666; margin-top: 8px; text-align: center; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="search-area">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Mã sp..." onkeyup="searchData()" autocomplete="off">
            <button class="btn-voice" id="voiceBtn" onclick="startVoice()">🎤 NÓI</button>
        </div>
        <div id="status">Đang tải kho hàng...</div>
    </div>

    <div id="itemList" class="item-list">
        </div>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1k5jVGEaXBRv9EOrUqSiTDJ7IrwWHIsTl3KrnYWArTrpZ17gLORwN06RqLUI6Y7My_Xs6OL6Es1Bl/pub?gid=954048889&single=true&output=csv";
    let allData = [];
    let fuse;

    function fetchData() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                allData = results.data.map(row => {
                    let cleanRow = {};
                    Object.keys(row).forEach(key => {
                        cleanRow[key.trim().replace(/\r?\n|\r/g, "")] = row[key];
                    });
                    return cleanRow;
                }).filter(row => row['Mã sản phẩm'] || row['Mã hàng']);

                fuse = new Fuse(allData, {
                    keys: ['Mã sản phẩm', 'Mã hàng'],
                    threshold: 0.3,
                    distance: 100
                });

                renderCards(allData);
                document.getElementById('status').innerText = `✅ Sẵn sàng - ${allData.length} mã`;
            }
        });
    }

    function renderCards(data) {
        const list = document.getElementById('itemList');
        list.innerHTML = '';
        
        // Chỉ hiện top 20 kết quả để tránh lag khi lái xe
        const displayData = data.slice(0, 20);

        displayData.forEach(item => {
            const ton = (item['Tồn'] || '0').toString().trim();
            const isOut = (parseInt(ton) <= 0 || ton.toLowerCase() === 'hết');
            const price = item['Giá'] || 'Liên hệ';
            const name = item['Mã hàng'] || 'Không tên';
            const sku = item['Mã sản phẩm'] || '';
            const program = item['Chương trình'] || '';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="sku">${sku}</span>
                <div class="row-1">
                    <div class="product-name">${name}</div>
                    <div class="stock-tag ${isOut ? 'out-of-stock' : ''}">${ton}</div>
                </div>
                <div class="row-2">
                    <div class="price">${price}</div>
                    <div class="program">${program}</div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function searchData() {
        const query = document.getElementById('searchInput').value;
        if (!query) { renderCards(allData); return; }
        const results = fuse.search(query);
        renderCards(results.map(r => r.item));
    }

    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'vi-VN';
        const btn = document.getElementById('voiceBtn');

        recognition.onstart = () => { btn.classList.add('recording'); btn.innerText = "🛑 NGHE"; };
        
        recognition.onresult = (event) => {
            let text = event.results[0][0].transcript.toLowerCase()
                .replace(/không/g, '0').replace(/một/g, '1').replace(/hai/g, '2')
                .replace(/ba/g, '3').replace(/bốn/g, '4').replace(/năm/g, '5')
                .replace(/sáu/g, '6').replace(/bảy/g, '7').replace(/tám/g, '8')
                .replace(/chín/g, '9').replace(/mờ/g, 'm').replace(/\./g, '')
                .replace(/\s+/g, '').toUpperCase();

            document.getElementById('searchInput').value = processed;
            searchData();
        };

        recognition.onend = () => { btn.classList.remove('recording'); btn.innerText = "🎤 NÓI"; };
        recognition.start();
    }

    window.onload = fetchData;
</script>
</body>
</html>
